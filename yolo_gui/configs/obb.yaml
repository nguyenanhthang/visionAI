# YOLO OBB Detection Dataset Config (DOTA format)
# Dùng cho bài toán phát hiện đối tượng với bounding box xoay (Oriented Bounding Box)
task: obb
path: /path/to/dataset  # Thư mục gốc của dataset
train: images/train     # Thư mục ảnh train
val: images/val         # Thư mục ảnh validation

# Số lượng classes
nc: 15

# Tên các class (DOTA dataset classes)
names:
  0: plane
  1: ship
  2: storage-tank
  3: baseball-diamond
  4: tennis-court
  5: basketball-court
  6: ground-track-field
  7: harbor
  8: bridge
  9: large-vehicle
  10: small-vehicle
  11: helicopter
  12: roundabout
  13: soccer-ball-field
  14: swimming-pool

# Lưu ý: Labels phải ở định dạng OBB (.txt)
# Mỗi dòng: class_id x1 y1 x2 y2 x3 y3 x4 y4 (8 điểm góc, normalized)
